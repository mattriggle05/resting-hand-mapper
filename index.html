<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #fff;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        p {
            display: block;
            position: fixed;
            font-size: 2vh;
            font-family: sans-serif;
            width: 98vw;
            text-align: center;
            border: 1px solid black;
            margin: 1vw;
            border-radius: 1vw;
        }
    </style>
</head>

<body>
    <p>
        Place 5 fingers on the screen
    </p>
    <canvas id="canvas"></canvas>
    <script src="./main.js"></script>
</body>

</html>
