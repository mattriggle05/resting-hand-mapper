<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #fff;
        }

        #main-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        #normalized-canvas {
            position: fixed;
            display: block;
            top: 0px;
            right: 0px;
            width: 30vw;
            height: 30vh;
            background-color: rgb(210, 210, 210);
            border: 1px solid black;
        }

        #output {
            position: fixed;
            display: block;
            top: 0px;
            left: 0px;
            width: 30vw;
            height: 30vh;
            background-color: #d2d2d2;
            border: 1px solid black;
        }

        #scale {
            position: fixed;
            display: block;
            top: 0px;
            width: 40vw;
            height: 3vh;
            left: 30vw;
            background: rgb(210, 210, 210);
            outline: none;
            border-bottom: 1px solid black;
        }

        #scale input {
            width: 100%;
            height: 100%;
        }

        #penny-container {
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            top: 3vh;
            width: 40vw;
            height: 27vh;
            left: 30vw;
            background: rgb(210, 210, 210);
            border-bottom: 1px solid black;
            overflow: hidden;
            touch-action: none;
        }

        #penny-div {
            border-radius: 50%;
            background: #ff00ff;
            border: 2px solid #cc00cc;
            flex-shrink: 0;
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas id="main-canvas"></canvas>
    <canvas id="normalized-canvas"></canvas>
    <textarea id="output"></textarea>
    <div id="scale">
        <input type="range" min="1" max="200" value="50" id="penny-slider">
    </div>
    <div id="penny-container">
        <div id="penny-div"></div>
    </div>
    <script src="main.js?v=1"></script>
</body>

</html>
