<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #fff;
        }

        canvas {
            touch-action: none;
            border: 2px red dashed;
        }

        #main-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #normalized-canvas {
            position: fixed;
            display: block;
            top: 0px;
            right: 0px;
            width: 30vw;
            height: 30vh;
            background-color: rgb(210, 210, 210);
        }

        #output {
            position: fixed;
            display: block;
            top: 0px;
            left: 0px;
            width: 30vw;
            height: 30vh;
            background-color: rgb(210, 210, 210);
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <canvas id="main-canvas"></canvas>
    <canvas id="normalized-canvas"></canvas>
    <textarea id="output"></textarea>
    <script src="main.js?v=sdoisndi"></script>
</body>

</html>
